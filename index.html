<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fighting game</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        font-family: "Segoe UI", system-ui, Arial, sans-serif;
        background: radial-gradient(circle at 50% 0%, #2a2a4a 0%, #12121f 60%, #0a0a12 100%);
        color: #f3f3fa;
        overflow: hidden;
      }

      /* Subtle vignette over the whole scene for arcade depth. */
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(circle at 50% 45%, transparent 55%, rgba(0, 0, 0, 0.55) 100%);
        z-index: 20;
      }

      /* ---- Title ---- */
      .game-title {
        position: fixed;
        top: 12px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 26px;
        font-weight: 800;
        letter-spacing: 6px;
        text-transform: uppercase;
        background: linear-gradient(180deg, #ffd34d, #ff8a3d);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        filter: drop-shadow(0 2px 0 rgba(0, 0, 0, 0.35));
        animation: titleGlow 2.6s ease-in-out infinite;
        z-index: 30;
        pointer-events: none;
        text-align: center;
      }

      .game-title small {
        display: block;
        margin-top: 3px;
        font-size: 10px;
        letter-spacing: 5px;
        -webkit-text-fill-color: rgba(243, 243, 250, 0.45);
        color: rgba(243, 243, 250, 0.45);
      }

      @keyframes titleGlow {
        0%, 100% { filter: drop-shadow(0 2px 0 rgba(0, 0, 0, 0.35)) drop-shadow(0 0 6px rgba(255, 138, 61, 0.25)); }
        50% { filter: drop-shadow(0 2px 0 rgba(0, 0, 0, 0.35)) drop-shadow(0 0 16px rgba(255, 180, 80, 0.6)); }
      }

      /* ---- HUD / health bars ---- */
      .hud {
        position: fixed;
        top: 58px;
        left: 0;
        right: 0;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 24px;
        padding: 0 40px;
        z-index: 30;
      }

      .fighter {
        width: 42%;
      }

      .fighter .name {
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 3px;
        text-transform: uppercase;
        margin-bottom: 6px;
        opacity: 0.9;
      }

      .fighter.enemy {
        text-align: right;
      }

      .bar {
        position: relative;
        height: 26px;
        background: rgba(0, 0, 0, 0.55);
        border: 2px solid rgba(255, 255, 255, 0.18);
        border-radius: 6px;
        box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.6);
        display: flex;
        overflow: hidden;
      }

      .fighter.enemy .bar {
        justify-content: flex-end;
      }

      .fill {
        position: relative;
        height: 100%;
        width: 100%;
        background: linear-gradient(90deg, #2fe430, #9dff5c);
        border-radius: 3px;
        transition: width 0.12s linear, background 0.2s linear;
      }

      /* Glossy sheen across the top of each bar. */
      .bar::before {
        content: "";
        position: absolute;
        inset: 0 0 50% 0;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.25), transparent);
        pointer-events: none;
        z-index: 1;
      }

      .hp {
        margin-top: 4px;
        font-size: 13px;
        letter-spacing: 1px;
        opacity: 0.85;
      }

      .vs {
        align-self: center;
        font-size: 22px;
        font-weight: 900;
        letter-spacing: 2px;
        color: #ff5e5e;
        text-shadow: 0 0 12px rgba(255, 94, 94, 0.6);
        animation: vsPulse 1.4s ease-in-out infinite;
      }

      @keyframes vsPulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.12); }
      }

      /* ---- Buttons ---- */
      .btn {
        font-family: inherit;
        font-weight: 800;
        letter-spacing: 3px;
        text-transform: uppercase;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        color: #16210f;
        transition: transform 0.08s ease, box-shadow 0.15s ease, opacity 0.2s, filter 0.15s ease;
      }

      .btn:active {
        transform: translateY(2px);
      }

      #startGame {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        padding: 18px 46px;
        font-size: 26px;
        background: linear-gradient(180deg, #6dff5c, #28c93f);
        box-shadow: 0 8px 0 #138a2a, 0 12px 24px rgba(0, 0, 0, 0.5);
        z-index: 40;
      }

      #startGame:hover {
        box-shadow: 0 8px 0 #138a2a, 0 14px 30px rgba(40, 201, 63, 0.5);
        filter: brightness(1.05);
      }

      #startGame:disabled {
        opacity: 0;
        pointer-events: none;
      }

      /* In-game button bar (pause + restart), top-right, only while playing. */
      .ingame-buttons {
        position: fixed;
        top: 16px;
        right: 24px;
        display: none;
        gap: 10px;
        z-index: 46; /* above the pause overlay so Resume stays clickable */
      }

      .btn-ingame {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 9px 16px;
        font-size: 12px;
        background: linear-gradient(180deg, #3a3a5e, #23233c);
        color: #f3f3fa;
        border: 1px solid rgba(255, 255, 255, 0.14);
        box-shadow: 0 4px 0 rgba(0, 0, 0, 0.4), 0 8px 18px rgba(0, 0, 0, 0.4);
      }

      .btn-ingame:hover {
        filter: brightness(1.2);
        box-shadow: 0 4px 0 rgba(0, 0, 0, 0.4), 0 8px 22px rgba(255, 180, 80, 0.3);
      }

      .btn-ingame .icon {
        font-size: 15px;
        line-height: 1;
      }

      /* ---- Pause overlay ---- */
      .pause-overlay {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(8, 8, 16, 0.55);
        backdrop-filter: blur(2px);
        z-index: 45;
        pointer-events: none; /* purely decorative — let clicks reach buttons */
      }

      .pause-overlay .paused-text {
        font-size: 40px;
        font-weight: 900;
        letter-spacing: 10px;
        text-transform: uppercase;
        color: #ffd34d;
        text-shadow: 0 0 20px rgba(255, 180, 80, 0.5);
      }

      /* ---- Game over modal ---- */
      .overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(8, 8, 16, 0.72);
        backdrop-filter: blur(3px);
        z-index: 50;
      }

      .modal {
        text-align: center;
        padding: 40px 56px;
        border-radius: 16px;
        background: linear-gradient(180deg, #20203a, #14141f);
        border: 1px solid rgba(255, 255, 255, 0.12);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
        animation: modalPop 0.25s ease-out;
      }

      @keyframes modalPop {
        from { transform: scale(0.85); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
      }

      .modal h2 {
        font-size: 26px;
        letter-spacing: 2px;
        margin-bottom: 22px;
      }

      .btn-restart {
        padding: 14px 38px;
        font-size: 18px;
        background: linear-gradient(180deg, #ffd34d, #ffae20);
        box-shadow: 0 6px 0 #c9871a, 0 10px 20px rgba(0, 0, 0, 0.4);
      }

      .btn-restart:hover {
        filter: brightness(1.05);
      }

      /* ---- Controls panel ---- */
      .controls {
        position: fixed;
        left: 24px;
        bottom: 24px;
        padding: 16px 20px;
        background: rgba(20, 20, 35, 0.78);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        z-index: 30;
      }

      .controls-title {
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: #ffd34d;
        margin-bottom: 10px;
      }

      .controls ul {
        list-style: none;
        display: grid;
        gap: 8px;
      }

      .controls li {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 13px;
        color: #d8d8e6;
      }

      .key {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 26px;
        height: 26px;
        padding: 0 7px;
        font-size: 12px;
        font-weight: 700;
        color: #14141f;
        background: linear-gradient(180deg, #ffffff, #c8c8d4);
        border-radius: 6px;
        box-shadow: 0 2px 0 rgba(0, 0, 0, 0.35);
      }

      /* ---- Round pips ---- */
      .rounds {
        display: flex;
        gap: 6px;
        margin-top: 8px;
      }

      .fighter.enemy .rounds {
        justify-content: flex-end;
      }

      .pip {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.15);
        border: 1px solid rgba(255, 255, 255, 0.25);
        transition: background 0.2s, box-shadow 0.2s;
      }

      .pip.won {
        background: linear-gradient(180deg, #ffd34d, #ff8a3d);
        box-shadow: 0 0 8px rgba(255, 180, 80, 0.7);
        border-color: transparent;
      }

      /* ---- Center column: round timer + VS ---- */
      .center-col {
        align-self: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
      }

      .round-timer {
        min-width: 48px;
        text-align: center;
        font-size: 30px;
        font-weight: 900;
        color: #ffffff;
        text-shadow: 0 2px 6px rgba(0, 0, 0, 0.6);
      }

      /* ---- Start screen difficulty selector ---- */
      .start-wrap {
        position: fixed;
        top: calc(50% + 72px);
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: #d8d8e6;
        z-index: 40;
      }

      .start-wrap select {
        font-family: inherit;
        font-weight: 700;
        letter-spacing: 1px;
        color: #16210f;
        background: linear-gradient(180deg, #ffffff, #c8c8d4);
        border: none;
        border-radius: 6px;
        padding: 6px 9px;
        cursor: pointer;
      }

      .start-wrap.hidden {
        display: none;
      }

      /* ---- Between-rounds banner ---- */
      .round-banner {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 48;
        pointer-events: none;
      }

      .round-banner .banner-text {
        font-size: 42px;
        font-weight: 900;
        letter-spacing: 6px;
        text-transform: uppercase;
        color: #ffd34d;
        text-shadow: 0 0 24px rgba(255, 180, 80, 0.55);
        animation: modalPop 0.3s ease-out;
      }
    </style>
  </head>
  <body>
    <div class="game-title">Fighting Game<small>ECS Arena</small></div>

    <div class="hud" id="health-info">
      <div class="fighter player">
        <div class="name">Player</div>
        <div class="bar"><div class="fill" id="player-health-bar"></div></div>
        <div class="hp">HP <span id="player-health">100</span></div>
        <div class="rounds" id="player-rounds">
          <span class="pip"></span><span class="pip"></span>
        </div>
      </div>

      <div class="center-col">
        <div class="round-timer" id="round-timer">60</div>
        <div class="vs">VS</div>
      </div>

      <div class="fighter enemy">
        <div class="name">Enemy</div>
        <div class="bar"><div class="fill" id="enemy-health-bar"></div></div>
        <div class="hp"><span id="enemy-health">100</span> HP</div>
        <div class="rounds" id="enemy-rounds">
          <span class="pip"></span><span class="pip"></span>
        </div>
      </div>
    </div>

    <button id="startGame" class="btn" onclick="startGame()">Start</button>

    <div id="start-wrap" class="start-wrap">
      <label for="difficulty">Difficulty</label>
      <select id="difficulty">
        <option value="easy">Easy</option>
        <option value="normal" selected>Normal</option>
        <option value="hard">Hard</option>
      </select>
    </div>

    <div id="ingameButtons" class="ingame-buttons">
      <button id="pauseGame" class="btn btn-ingame" onclick="togglePause()">
        <span class="icon">&#10073;&#10073;</span> <span id="pauseLabel">Pause</span>
      </button>
      <button id="inGameRestart" class="btn btn-ingame" onclick="inGameRestart()">
        <span class="icon">&#8635;</span> Restart
      </button>
      <button id="muteGame" class="btn btn-ingame" onclick="window.SFX && (document.getElementById('muteLabel').innerText = window.SFX.toggleMute() ? 'Unmute' : 'Mute')">
        <span class="icon">&#119070;</span> <span id="muteLabel">Mute</span>
      </button>
    </div>

    <div id="pause-screen" class="pause-overlay">
      <div class="paused-text">Paused</div>
    </div>

    <div id="round-banner" class="round-banner">
      <div class="banner-text">Round won!</div>
    </div>

    <div id="game-over-screen" class="overlay" style="display: none">
      <div class="modal">
        <h2 id="winner">Game Over!</h2>
        <button class="btn btn-restart" onclick="restartGame()">Restart</button>
      </div>
    </div>

    <div class="controls">
      <div class="controls-title">Controls</div>
      <ul>
        <li><span class="key">&#8592;</span><span class="key">&#8594;</span> Move</li>
        <li><span class="key">&#8593;</span><span class="key">&#8595;</span> Up / Down</li>
        <li><span class="key">Space</span> Jump</li>
        <li><span class="key">A</span> Punch</li>
        <li><span class="key">S</span> Kick</li>
        <li><span class="key">Q</span> Block</li>
        <li><span class="key">P</span> Pause &nbsp; <span class="key">R</span> Restart &nbsp; <span class="key">M</span> Mute</li>
      </ul>
    </div>

    <!-- Audio (synthesized SFX) -->
    <script src="audio.js"></script>

    <!-- Components -->
    <script src="components/components.js"></script>

    <!-- Entities -->
    <script src="entities/entity.js"></script>
    <script src="entities/playerEntity.js"></script>
    <script src="entities/enemyEntity.js"></script>

    <!-- Systems -->
    <script src="systems/combatSystem.js"></script>
    <script src="systems/roundSystem.js"></script>
    <script src="systems/enemyAiSystem.js"></script>
    <script src="systems/collisionSystem.js"></script>
    <script src="systems/movementSystem.js"></script>
    <script src="systems/renderingSystem.js"></script>
    <script src="systems/statsSystem.js"></script>

    <!-- Main -->
    <script src="main.js"></script>
  </body>
</html>
